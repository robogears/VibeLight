name: VibeLight
options:
  bundleIdPrefix: com.vibelight
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Xcode "recommended settings" — set here (not via the Xcode prompt, which
    # xcodegen would overwrite). Safe: we have no run-script build phases.
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  # Native RSA keygen + self-signed X.509 cert generation (replaces the
  # /usr/bin/openssl Process shell-out that iOS forbids). Wired into the iOS
  # target ONLY — macOS keeps its proven openssl→P12→SecPKCS12Import path
  # unchanged, so the shared identity code is #if os(iOS) for the X509 parts.
  swift-certificates:
    url: https://github.com/apple/swift-certificates.git
    exactVersion: 1.19.3
targets:

  # ── macOS app: the existing big-picture shell (behaviorally unchanged) ──────
  VibeLight:
    type: application
    platform: macOS
    sources:
      - path: VibeLight
        excludes:
          - "App/iOS/**"      # iOS SwiftUI shell + iOS-only seam conformers
          - "Streaming/**"    # in-process engine bridge (iOS-only for now)
    info:
      path: VibeLight/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # GameStream hosts are self-signed BY DESIGN; VibeLight does byte-exact
        # certificate pinning in HostAPIClient (stronger than ATS CA-trust for
        # this protocol). Without this, ATS kills the TLS handshake before our
        # pinning delegate ever runs (verified live: -1200 in-app, success in
        # an ATS-free CLI with identical code).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: VibeLight connects to your gaming PC to list games, fetch box art, and stream them.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelight.app
        PRODUCT_NAME: VibeLight
        MARKETING_VERSION: 0.1.8
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.games
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: YES
        INFOPLIST_KEY_NSSupportsAutomaticTermination: NO
        INFOPLIST_KEY_NSSupportsSuddenTermination: NO
        SWIFT_STRICT_CONCURRENCY: complete

  # ── macOS DEV build: same code, different name/icon/bundle-id so it installs
  #    and runs ALONGSIDE the real app for testing. Distinct bundle id means its
  #    settings/presets/hosts (UserDefaults) and box-art cache are separate; it
  #    shares the release's client identity (App Support), which is convenient.
  #    The release target/DMG is untouched — this is purely additive.
  VibeLight-Dev:
    type: application
    platform: macOS
    sources:
      - path: VibeLight
        excludes:
          - "App/iOS/**"
          - "Streaming/**"
    info:
      path: VibeLight/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: VibeLight Dev connects to your gaming PC to list games, fetch box art, and stream them.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelight.app.dev
        PRODUCT_NAME: "VibeLight Dev"
        MARKETING_VERSION: 0.1.8
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDev
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.games
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: YES
        INFOPLIST_KEY_NSSupportsAutomaticTermination: NO
        INFOPLIST_KEY_NSSupportsSuddenTermination: NO
        SWIFT_STRICT_CONCURRENCY: complete

  # ── iOS / iPadOS app: shared Core/Input/UI + a minimal SwiftUI shell ────────
  VibeLight-iOS:
    type: application
    platform: iOS
    sources:
      - path: VibeLight
        # macOS-only files with no iOS counterpart. AppRelocator/UpdateService
        # stay (they carry #if os(macOS) impl + an iOS stub in the same file);
        # iOSIdentity.swift stays (it is #if os(iOS)); the macOS Info.plist is
        # excluded so it isn't copied as a stray resource.
        excludes:
          - "App/main.swift"
          - "App/BigPictureWindow.swift"
          - "Core/StreamSessionManager.swift"
          - "Info.plist"
    info:
      path: VibeLight/iOS-Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Same self-signed-host story as macOS: fully disable ATS so our own
        # cert-pinning delegate governs trust and the plain-HTTP pairing step
        # (:47989) is allowed. CRITICAL: do NOT add NSAllowsLocalNetworking here —
        # Apple IGNORES NSAllowsArbitraryLoads whenever NSAllowsLocalNetworking is
        # also present (iOS 10+), which re-enables ATS and kills the self-signed
        # TLS (-9802/-1200) and the HTTP pair request (-1022). Verified on device.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: VibeLight connects to your gaming PC on your local network to list games, fetch box art, and stream them.
        GCSupportsControllerUserInteraction: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        # Landscape-only on both iPhone and iPad (big-picture UI is horizontal).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: swift-certificates
        product: X509
      # In-process streaming (Phase 2): the C core + its crypto/audio libs.
      # xcframeworks are built by scripts/ios/build-deps.sh (gitignored).
      - target: MoonlightCore
      - framework: ThirdParty/ios/mbedcrypto.xcframework
        embed: false
      - framework: ThirdParty/ios/opus.xcframework
        embed: false
    # Signing team comes from Signing.xcconfig → Local.xcconfig (gitignored), so
    # a personal Team ID never lands in this public repo and — unlike setting it
    # in Xcode's UI — it SURVIVES `xcodegen generate`. Absent Local.xcconfig,
    # DEVELOPMENT_TEAM is unset and the Simulator still builds/signs locally
    # (the keychain-access-groups entitlement still applies); only on-DEVICE
    # builds need the team. See Local.xcconfig.example.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelight.ios
        PRODUCT_NAME: VibeLight
        MARKETING_VERSION: 0.1.8
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: VibeLightiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Streaming bridge: Swift sees MoonlightSession (ObjC++) via the bridging
        # header; MoonlightSession.mm sees Limelight.h via the search path.
        SWIFT_OBJC_BRIDGING_HEADER: VibeLight/Streaming/VibeLight-Bridging.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/src"
          # Opus decode for the in-process audio renderer (device + sim headers
          # are identical; either slice's Headers dir works for compilation).
          - "$(SRCROOT)/ThirdParty/ios/opus.xcframework/ios-arm64/Headers"
        TARGETED_DEVICE_FAMILY: "1,2"   # 1 = iPhone, 2 = iPad
        # iPhone + iPad ONLY: drop the "Designed for iPad" run-on-Mac and
        # run-on-Vision-Pro destinations (both default to YES).
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_STRICT_CONCURRENCY: complete

  # ── MoonlightCore: the in-process C streaming core (streaming Phase 2) ──────
  #    moonlight-common-c + enet + nanors, compiled for iOS against mbedcrypto.
  #    Source + xcframeworks are vendored (gitignored) by scripts/ios/build-deps.sh.
  MoonlightCore:
    type: library.static
    platform: iOS
    sources:
      - path: ThirdParty/moonlight-common-c/src
      - path: ThirdParty/moonlight-common-c/enet
        excludes: ["win32.c"]        # Windows-only sockets impl
      - path: ThirdParty/moonlight-common-c/nanors/rs.c
    settings:
      base:
        GCC_PREPROCESSOR_DEFINITIONS: ["$(inherited)", "USE_MBEDTLS", "HAS_SOCKLEN_T"]
        GCC_C_LANGUAGE_STANDARD: gnu11
        # Third-party C we don't maintain — the enet/common-c warnings (enum
        # bitwise ops, size_t narrowing) are upstream noise in every Moonlight
        # build. Keep OUR targets' warnings loud; silence this one.
        WARNING_CFLAGS: ["-w"]
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/src"
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/enet/include"
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/nanors"
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/nanors/deps"
          - "$(SRCROOT)/ThirdParty/moonlight-common-c/nanors/deps/obl"
          - "$(SRCROOT)/ThirdParty/ios/mbedcrypto.xcframework/ios-arm64/Headers"

  # ── Unit tests: macOS only (unchanged) ─────────────────────────────────────
  VibeLightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VibeLightTests
    dependencies:
      - target: VibeLight
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VibeLight.app/Contents/MacOS/VibeLight"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelight.tests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: complete

  # ── iOS tests: runtime-verify the keychain identity path in the simulator ───
  VibeLightiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VibeLightiOSTests
    dependencies:
      - target: VibeLight-iOS
    settings:
      base:
        # The app's PRODUCT_NAME is "VibeLight" (target is "VibeLight-iOS"), so
        # the host bundle/binary is VibeLight.app/VibeLight — override the
        # target-name-derived default.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VibeLight.app/VibeLight"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelight.ios.tests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  VibeLight:
    build:
      targets:
        VibeLight: all
        VibeLightTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeLightTests
  VibeLight-Dev:
    build:
      targets:
        VibeLight-Dev: all
    run:
      config: Debug
  VibeLight-iOS:
    build:
      targets:
        VibeLight-iOS: all
        VibeLightiOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeLightiOSTests
